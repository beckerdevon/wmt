<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Walmart Modular Planner</title>
<meta name="theme-color" content="#0f172a" />
<style>
:root{--bg:#f5f7fb;--card:#ffffff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--blue:#2563eb;--green:#16a34a;--orange:#f97316;--red:#dc2626;--purple:#7c3aed;--shadow:0 10px 30px rgba(15,23,42,.08);--radius:20px}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:linear-gradient(180deg,#eef4ff 0,#f8fafc 220px);color:var(--ink);padding-bottom:40px}.app{max-width:1100px;margin:0 auto;padding:16px}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin:10px 0 14px}.title h1{font-size:28px;margin:0;letter-spacing:-.04em}.title p{color:var(--muted);margin:5px 0 0;font-size:14px}.pill{border:1px solid var(--line);background:rgba(255,255,255,.8);border-radius:999px;padding:8px 12px;font-size:12px;color:var(--muted);white-space:nowrap}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.card{background:rgba(255,255,255,.92);border:1px solid rgba(226,232,240,.9);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:14px}.metric{min-height:92px}.metric .label{font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.05em}.metric .value{font-size:26px;font-weight:900;margin-top:6px;letter-spacing:-.04em}.metric .sub{font-size:12px;color:var(--muted);margin-top:4px}.progress{height:10px;border-radius:999px;background:#e5e7eb;overflow:hidden;margin-top:10px}.bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));width:0}h2{font-size:18px;margin:0 0 12px;letter-spacing:-.02em}.section-head{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}button{border:0;border-radius:14px;padding:10px 12px;font-weight:800;background:#e2e8f0;color:#0f172a;cursor:pointer}button.primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:white}button.good{background:#dcfce7;color:#166534}button.warn{background:#ffedd5;color:#9a3412}button.danger{background:#fee2e2;color:#991b1b}button.small{font-size:12px;padding:8px 10px;border-radius:11px}form{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.full{grid-column:1/-1}label{display:block;font-size:12px;color:var(--muted);font-weight:800;margin-bottom:5px}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:14px;background:white;padding:11px 12px;font-size:16px;color:var(--ink)}textarea{min-height:76px;resize:vertical}.mods{display:grid;gap:10px}.mod{border:1px solid var(--line);border-radius:18px;background:#fff;padding:12px}.mod-top{display:flex;justify-content:space-between;gap:10px}.mod-title{font-weight:900}.mod-meta{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.35}.status{font-size:12px;font-weight:900;border-radius:999px;padding:6px 9px;height:max-content;white-space:nowrap}.s-not{background:#fee2e2;color:#991b1b}.s-progress{background:#dbeafe;color:#1d4ed8}.s-done{background:#dcfce7;color:#166534}.mod-notes{font-size:13px;color:#334155;margin-top:8px;white-space:pre-wrap}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:end}.empty{color:var(--muted);font-size:14px;padding:12px;border:1px dashed var(--line);border-radius:16px;background:#f8fafc}.insight{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.insight div{background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:12px}.insight b{display:block;font-size:18px}.insight span{color:var(--muted);font-size:12px}.modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);padding:20px;z-index:10;align-items:center;justify-content:center}.modal.open{display:flex}.modal-box{background:white;border-radius:22px;max-width:420px;width:100%;padding:16px;box-shadow:0 25px 80px rgba(0,0,0,.25)}.file{display:none}.controls{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px;margin-bottom:12px}.chart-wrap{overflow-x:auto}.chart{min-width:720px}.legend{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-top:8px}.legend i{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:-2px}.badge{display:inline-block;background:#f1f5f9;border:1px solid var(--line);padding:4px 8px;border-radius:999px;font-size:12px;color:#475569;margin-top:6px}@media(max-width:800px){.grid{grid-template-columns:repeat(2,1fr)}form{grid-template-columns:1fr}.insight{grid-template-columns:repeat(2,1fr)}.controls{grid-template-columns:1fr 1fr}.top{display:block}.pill{display:inline-block;margin-top:10px}.app{padding:12px}.title h1{font-size:25px}}@media(max-width:520px){.insight{grid-template-columns:1fr}.controls{grid-template-columns:1fr}.metric .value{font-size:23px}}
</style>
</head>
<body>
<div class="app">
  <div class="top"><div class="title"><h1>Modular Planner</h1><p>Local one-page tracker for Walmart modular planning.</p></div><div class="pill">Saved locally on this device</div></div>
  <section class="grid" id="dashboard"></section>
  <section class="card"><div class="section-head"><h2>7-Day Workload Graph</h2><div class="toolbar"><button class="small" onclick="drawChart()">Refresh Graph</button></div></div><div class="chart-wrap"><canvas id="workloadChart" class="chart" width="920" height="360"></canvas></div><div class="legend" id="chartLegend"></div></section>
  <section class="card"><div class="section-head"><h2>Deeper Metrics</h2><div class="toolbar"><button class="small" onclick="exportBackup()">Export Backup</button><button class="small" onclick="document.getElementById('importFile').click()">Import Backup</button><button class="small danger" onclick="clearAll()">Clear All</button><input class="file" id="importFile" type="file" accept="application/json" onchange="importBackup(event)"></div></div><div class="insight" id="insights"></div></section>
  <section class="card"><h2>Add / Update Modular</h2><form id="modForm"><input type="hidden" id="editId"><div><label>Department</label><input id="department" placeholder="Ex: 72" required></div><div><label>Category</label><input id="category" placeholder="Ex: TVs" required></div><div class="full"><label>Category Description</label><input id="description" placeholder="Ex: 65 inch TV wall reset"></div><div><label>Assigned Associate</label><input id="assignee" list="associateList" placeholder="Ex: Devon"><datalist id="associateList"></datalist></div><div><label>Number of Sections</label><input id="sections" type="number" min="1" step="1" required></div><div><label>Labor Hours</label><input id="labor" type="number" min="0" step="0.25" required></div><div><label>Planned Set Date</label><input id="date" type="date"></div><div><label>Status</label><select id="status"><option value="not">Not Started</option><option value="progress">In Progress</option><option value="done">Complete</option></select></div><div class="full"><label>Notes</label><textarea id="notes" placeholder="Fixtures, signing, aisle notes, blockers, etc."></textarea></div><div class="full toolbar"><button class="primary" type="submit">Save Modular</button><button type="button" onclick="resetForm()">Reset Form</button><button type="button" onclick="setTodayDate()">Use Today</button></div></form></section>
  <section class="card"><div class="section-head"><h2>Today’s Plan</h2><span class="badge" id="todaySummary"></span></div><div id="todayList" class="mods"></div></section>
  <section class="card"><h2>Unscheduled Modulars</h2><div id="unscheduledList" class="mods"></div></section>
  <section class="card"><div class="section-head"><h2>All Modulars</h2></div><div class="controls"><div><label>Search</label><input id="search" placeholder="Dept, category, associate, notes" oninput="render()"></div><div><label>Status</label><select id="filterStatus" onchange="render()"><option value="all">All</option><option value="open">Open</option><option value="not">Not Started</option><option value="progress">In Progress</option><option value="done">Complete</option><option value="overdue">Overdue</option><option value="today">Today</option><option value="unscheduled">Unscheduled</option></select></div><div><label>Associate</label><select id="filterAssignee" onchange="render()"><option value="all">All Associates</option><option value="unassigned">Unassigned</option></select></div><div><label>Sort By</label><select id="sortBy" onchange="render()"><option value="recommended">Recommended</option><option value="dateAsc">Date ↑</option><option value="dateDesc">Date ↓</option><option value="laborDesc">Labor High → Low</option><option value="laborAsc">Labor Low → High</option><option value="dept">Department</option><option value="assignee">Associate</option><option value="status">Status</option></select></div></div><div id="allList" class="mods"></div></section>
</div>
<div class="modal" id="dateModal"><div class="modal-box"><h2>Schedule Later</h2><p style="color:var(--muted);font-size:14px">Choose a planned set date for this modular.</p><input id="laterDate" type="date"><div class="toolbar" style="margin-top:12px"><button class="primary" onclick="confirmLaterDate()">Schedule</button><button onclick="closeModal()">Cancel</button></div></div></div>
<script>
const KEY='walmart_modular_tracker_v3';let mods=load().map(m=>({...m,assignee:m.assignee||''}));let laterTarget=null;const $=id=>document.getElementById(id);const colors=['#2563eb','#7c3aed','#16a34a','#f97316','#dc2626','#0891b2','#be123c','#4f46e5'];
function today(){return new Date().toISOString().slice(0,10)}function addDays(n){const x=new Date();x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)}function niceDate(s){if(!s)return 'Unscheduled';const [y,m,d]=s.split('-');return `${m}/${d}`}function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch{return []}}function save(){localStorage.setItem(KEY,JSON.stringify(mods));render()}function fmt(n){return Number(n||0).toFixed(Number(n||0)%1?2:0)}function statusText(s){return s==='done'?'Complete':s==='progress'?'In Progress':'Not Started'}function statusClass(s){return s==='done'?'s-done':s==='progress'?'s-progress':'s-not'}function esc(s){return String(s||'').replace(/[&<>'"]/g,a=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[a]))}
function resetForm(){['editId','department','category','description','assignee','sections','labor','date','notes'].forEach(id=>$(id).value='');$('status').value='not'}function setTodayDate(){$('date').value=today()}
$('modForm').addEventListener('submit',e=>{e.preventDefault();const id=$('editId').value||crypto.randomUUID();const item={id,department:$('department').value.trim(),category:$('category').value.trim(),description:$('description').value.trim(),assignee:$('assignee').value.trim(),sections:+$('sections').value,labor:+$('labor').value,date:$('date').value,status:$('status').value,notes:$('notes').value.trim(),updated:new Date().toISOString()};mods=mods.filter(m=>m.id!==id).concat(item);resetForm();save()});
function score(m){let s=(+m.labor||0)*2+(+m.sections||0);if(!m.date)s+=8;else{const diff=(new Date(m.date)-new Date(today()))/86400000;if(diff<0)s+=30;else if(diff<=2)s+=18;else if(diff<=7)s+=8}if(m.status==='progress')s+=6;if(!m.assignee)s+=2;return s}
function calc(){const total=mods.length,done=mods.filter(m=>m.status==='done').length,open=mods.filter(m=>m.status!=='done'),labor=mods.reduce((s,m)=>s+(+m.labor||0),0),doneLabor=mods.filter(m=>m.status==='done').reduce((s,m)=>s+(+m.labor||0),0),remaining=labor-doneLabor,t=today();const todayMods=mods.filter(m=>m.date===t&&m.status!=='done'),uns=mods.filter(m=>!m.date&&m.status!=='done'),over=mods.filter(m=>m.date&&m.date<t&&m.status!=='done'),next7=mods.filter(m=>m.date&&m.date>=t&&m.date<=addDays(6)&&m.status!=='done'),sectionsOpen=open.reduce((s,m)=>s+(+m.sections||0),0),next=[...open].sort((a,b)=>score(b)-score(a))[0];const unassigned=open.filter(m=>!m.assignee).length;return{total,done,open,labor,doneLabor,remaining,todayMods,uns,over,next7,sectionsOpen,next,unassigned,completion:total?Math.round(done/total*100):0,laborCompletion:labor?Math.round(doneLabor/labor*100):0,avgSection:sectionsOpen?remaining/sectionsOpen:0}}
function associateNames(){return [...new Set(mods.map(m=>(m.assignee||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b))}
function updateAssociateControls(){const names=associateNames();$('associateList').innerHTML=names.map(n=>`<option value="${esc(n)}"></option>`).join('');const cur=$('filterAssignee').value;$('filterAssignee').innerHTML='<option value="all">All Associates</option><option value="unassigned">Unassigned</option>'+names.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('');$('filterAssignee').value=[...names,'all','unassigned'].includes(cur)?cur:'all'}
function render(){updateAssociateControls();const c=calc();$('dashboard').innerHTML=`<div class="card metric"><div class="label">Completion</div><div class="value">${c.completion}%</div><div class="sub">${c.done} of ${c.total} complete</div><div class="progress"><div class="bar" style="width:${c.completion}%"></div></div></div><div class="card metric"><div class="label">Remaining Labor</div><div class="value">${fmt(c.remaining)}</div><div class="sub">${fmt(c.laborCompletion)}% labor completed</div><div class="progress"><div class="bar" style="width:${c.laborCompletion}%"></div></div></div><div class="card metric"><div class="label">Today’s Workload</div><div class="value">${fmt(c.todayMods.reduce((s,m)=>s+(+m.labor||0),0))}</div><div class="sub">${c.todayMods.length} modular(s) scheduled today</div></div><div class="card metric"><div class="label">Recommended Next</div><div class="value" style="font-size:18px">${c.next?esc(c.next.category):'None'}</div><div class="sub">${c.next?`Dept ${esc(c.next.department)} • ${fmt(c.next.labor)} hrs • ${esc(c.next.assignee||'Unassigned')}`:'Add an open modular'}</div></div>`;$('insights').innerHTML=`<div><b>${c.over.length}</b><span>Overdue open modulars</span></div><div><b>${c.uns.length}</b><span>Unscheduled open modulars</span></div><div><b>${c.next7.length}</b><span>Open modulars due in next 7 days</span></div><div><b>${c.unassigned}</b><span>Open modulars unassigned</span></div><div><b>${fmt(c.sectionsOpen)}</b><span>Sections still open</span></div><div><b>${fmt(c.avgSection)}</b><span>Avg remaining labor per open section</span></div><div><b>${fmt(c.open.length?c.remaining/c.open.length:0)}</b><span>Avg hours per open modular</span></div><div><b>${topAssociateText()}</b><span>Heaviest 7-day associate load</span></div>`;$('todaySummary').textContent=`${c.todayMods.length} mods • ${fmt(c.todayMods.reduce((s,m)=>s+(+m.labor||0),0))} labor hours`;list('todayList',sortMods(c.todayMods,'assignee'),true);list('unscheduledList',c.uns.sort((a,b)=>score(b)-score(a)),false);list('allList',sortMods(filteredMods(),$('sortBy').value),true);drawChart()}
function filteredMods(){let arr=[...mods];const q=$('search').value.trim().toLowerCase(),f=$('filterStatus').value,a=$('filterAssignee').value,t=today();if(q)arr=arr.filter(m=>[m.department,m.category,m.description,m.assignee,m.notes].join(' ').toLowerCase().includes(q));if(f==='open')arr=arr.filter(m=>m.status!=='done');if(f==='not'||f==='progress'||f==='done')arr=arr.filter(m=>m.status===f);if(f==='overdue')arr=arr.filter(m=>m.date&&m.date<t&&m.status!=='done');if(f==='today')arr=arr.filter(m=>m.date===t);if(f==='unscheduled')arr=arr.filter(m=>!m.date);if(a==='unassigned')arr=arr.filter(m=>!m.assignee);else if(a!=='all')arr=arr.filter(m=>m.assignee===a);return arr}
function sortMods(arr,sort){const statusOrder={progress:0,not:1,done:2};return [...arr].sort((a,b)=>{if(sort==='recommended')return score(b)-score(a);if(sort==='dateAsc')return (a.date||'9999-99-99').localeCompare(b.date||'9999-99-99');if(sort==='dateDesc')return (b.date||'0000-00-00').localeCompare(a.date||'0000-00-00');if(sort==='laborDesc')return (+b.labor||0)-(+a.labor||0);if(sort==='laborAsc')return (+a.labor||0)-(+b.labor||0);if(sort==='dept')return String(a.department).localeCompare(String(b.department),undefined,{numeric:true});if(sort==='assignee')return (a.assignee||'Unassigned').localeCompare(b.assignee||'Unassigned')||(a.date||'').localeCompare(b.date||'');if(sort==='status')return statusOrder[a.status]-statusOrder[b.status];return 0})}
function list(id,arr,showEmpty){$(id).innerHTML=arr.length?arr.map(card).join(''):(showEmpty!==false?'<div class="empty">Nothing to show here yet.</div>':'<div class="empty">No unscheduled open modulars.</div>')}function card(m){return `<div class="mod"><div class="mod-top"><div><div class="mod-title">Dept ${esc(m.department)} • ${esc(m.category)}</div><div class="mod-meta">${m.date?`Planned ${m.date}`:'Unscheduled'} • ${fmt(m.sections)} sections • ${fmt(m.labor)} labor hrs<br>Assigned: <b>${esc(m.assignee||'Unassigned')}</b></div></div><div class="status ${statusClass(m.status)}">${statusText(m.status)}</div></div>${m.description?`<div class="mod-notes"><b>${esc(m.description)}</b></div>`:''}${m.notes?`<div class="mod-notes">${esc(m.notes)}</div>`:''}<div class="actions"><button class="small" onclick="editMod('${m.id}')">Edit</button>${m.status!=='done'?`<button class="small good" onclick="setStatus('${m.id}','done')">Mark Complete</button>`:''}${m.status==='not'?`<button class="small" onclick="setStatus('${m.id}','progress')">Start</button>`:''}<button class="small warn" onclick="scheduleToday('${m.id}')">Schedule for Today</button><button class="small" onclick="openLater('${m.id}')">Schedule Later</button><button class="small danger" onclick="delMod('${m.id}')">Delete</button></div></div>`}
function editMod(id){const m=mods.find(x=>x.id===id);if(!m)return;$('editId').value=m.id;$('department').value=m.department;$('category').value=m.category;$('description').value=m.description||'';$('assignee').value=m.assignee||'';$('sections').value=m.sections;$('labor').value=m.labor;$('date').value=m.date||'';$('status').value=m.status;$('notes').value=m.notes||'';scrollTo({top:420,behavior:'smooth'})}function setStatus(id,status){mods=mods.map(m=>m.id===id?{...m,status}:m);save()}function scheduleToday(id){mods=mods.map(m=>m.id===id?{...m,date:today()}:m);save()}function openLater(id){laterTarget=id;$('laterDate').value=today();$('dateModal').classList.add('open')}function closeModal(){$('dateModal').classList.remove('open');laterTarget=null}function confirmLaterDate(){const d=$('laterDate').value;if(!d||!laterTarget)return;mods=mods.map(m=>m.id===laterTarget?{...m,date:d}:m);closeModal();save()}function delMod(id){if(confirm('Delete this modular?')){mods=mods.filter(m=>m.id!==id);save()}}function clearAll(){if(confirm('This deletes all saved modulars on this device. Export a backup first if needed. Continue?')){mods=[];save()}}
function workloadData(){const days=Array.from({length:7},(_,i)=>addDays(i));const names=associateNames();const rows=days.map(d=>{const dayMods=mods.filter(m=>m.date===d&&m.status!=='done');const total=dayMods.reduce((s,m)=>s+(+m.labor||0),0);const by={};dayMods.forEach(m=>{const n=m.assignee||'Unassigned';by[n]=(by[n]||0)+(+m.labor||0)});return{date:d,total,by}});return{days,names:[...new Set([...names,'Unassigned'].filter(n=>rows.some(r=>r.by[n])))],rows}}
function topAssociateText(){const data=workloadData();let best={name:'None',hours:0};data.names.forEach(n=>{const h=data.rows.reduce((s,r)=>s+(r.by[n]||0),0);if(h>best.hours)best={name:n,hours:h}});return best.hours?`${best.name}: ${fmt(best.hours)}h`:'None'}
function drawChart(){const canvas=$('workloadChart');if(!canvas)return;const ctx=canvas.getContext('2d'),data=workloadData(),W=canvas.width,H=canvas.height;ctx.clearRect(0,0,W,H);ctx.font='12px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';const pad={l:48,r:22,t:20,b:58},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;const max=Math.max(4,...data.rows.map(r=>r.total))*1.2;ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;for(let i=0;i<=4;i++){const y=pad.t+ch-(ch*i/4);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='#64748b';ctx.fillText(fmt(max*i/4),8,y+4)}const groupW=cw/7,barW=Math.min(42,groupW*.42);data.rows.forEach((r,i)=>{const x=pad.l+i*groupW+groupW*.18;let yBase=pad.t+ch;let stackX=x;Object.entries(r.by).forEach(([name,h],idx)=>{const bh=ch*(h/max);ctx.fillStyle=colors[data.names.indexOf(name)%colors.length]||'#94a3b8';ctx.fillRect(stackX,yBase-bh,barW,bh);yBase-=bh});const lineH=ch*(r.total/max);ctx.strokeStyle='#0f172a';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x+barW+8,pad.t+ch);ctx.lineTo(x+barW+8,pad.t+ch-lineH);ctx.stroke();ctx.fillStyle='#0f172a';ctx.fillText(fmt(r.total)+'h',x,pad.t+ch-lineH-6);ctx.fillStyle='#64748b';ctx.fillText(i===0?'Today':niceDate(r.date),x-2,H-28);ctx.fillText(new Date(r.date+'T00:00:00').toLocaleDateString(undefined,{weekday:'short'}),x-1,H-12)});ctx.fillStyle='#64748b';ctx.fillText('Labor hours',8,14);$('chartLegend').innerHTML=data.names.map((n,i)=>`<span><i style="background:${colors[i%colors.length]}"></i>${esc(n)}</span>`).join('')+'<span><i style="background:#0f172a"></i>Total per day marker</span>'}
function exportBackup(){const blob=new Blob([JSON.stringify({app:'Walmart Modular Planner',version:4,exported:new Date().toISOString(),mods},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='modular-planner-backup-'+today()+'.json';a.click();URL.revokeObjectURL(a.href)}function importBackup(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{const data=JSON.parse(r.result);const incoming=Array.isArray(data)?data:data.mods;if(!Array.isArray(incoming))throw Error();if(confirm('Import backup? This will replace the modulars currently saved on this device.')){mods=incoming.map(m=>({...m,assignee:m.assignee||''}));save()}}catch{alert('That backup file could not be read.')}};r.readAsText(file);e.target.value=''}render();
</script>
</body>
</html>
